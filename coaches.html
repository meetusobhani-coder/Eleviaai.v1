<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevia AI — Coaches</title>
<!-- Header -->
  <header class="site-header">
    <h1 class="site-title">Elevia AI</h1>
  <span class="beta-badge">BETA</span>
</h1>

  </header>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app2.js"></script>

  <style>
    body { background:#f8fafc; font-family: Inter, system-ui, sans-serif; }

    .wrap{max-width:1100px;margin:0 auto;padding:32px 16px;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:24px;}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:620px){.grid{grid-template-columns:1fr;}}

    .card{
      background:#fff;border-radius:22px;padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .top{display:flex;gap:14px;align-items:flex-start;}
    .photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:1px solid #e5e7eb;}
    .name{margin:0;font-weight:900;color:#0f172a;font-size:1.15rem;}
    .tag{
      display:inline-block;background:#eef2ff;color:#3730a3;
      padding:4px 12px;border-radius:999px;font-size:.75rem;font-weight:700;margin-top:6px;
    }
    .bio{margin-top:10px;color:#475569;font-size:.92rem;line-height:1.45;}

    .actions{margin-top:16px;}
    .btn{
      background:#4f46e5;color:#fff;border:none;
      padding:10px 16px;border-radius:14px;
      font-size:.85rem;font-weight:800;cursor:pointer;
    }
    .btn.secondary{
      background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;
    }

    .slots{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .slot{
      border:1px solid #e5e7eb;
      background:#f9fafb;
      border-radius:14px;
      padding:10px 14px;
      font-weight:800;
      font-size:.82rem;
      cursor:pointer;
      text-align:left;
    }

    .slot:hover{background:#eef2ff;border-color:#c7d2fe;}

    .hidden{display:none;}
    .muted{color:#6b7280;font-size:.9rem;}

    /* ✅ Booking Modal */
    .overlay{
      position:fixed;inset:0;
      background:rgba(15,23,42,.6);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
    }

    .modal{
      background:#fff;
      width:100%;
      max-width:420px;
      padding:24px;
      border-radius:22px;
      position:relative;
      box-shadow:0 30px 80px rgba(0,0,0,.25);

    }

    .close-btn{
      position:absolute;
      top:14px;right:14px;
      width:36px;height:36px;
      border-radius:50%;
      border:none;
      background:#f1f5f9;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
    }

    .modal h3{text-align:center;margin:0;}
    .modal-sub{text-align:center;margin:10px 0 18px;color:#475569;font-size:.9rem;}

    .modal input,.modal textarea{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid #e5e7eb;
      background:#f9fafb;
      margin-top:10px;
      font-size:.9rem;
    }

    .modal textarea{min-height:90px;}

    .btn.primary{
      width:100%;
      margin-top:16px;
      background:linear-gradient(95deg,#4f46e5,#6366f1);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h2>Coaches Panel</h2>
    <p class="muted">Browse our coaches and book an available session.</p>
    <div id="status" class="muted">Loading…</div>
    <div id="grid" class="grid"></div>
  </div>

  <!-- ✅ Booking Modal -->
  <div id="overlay" class="overlay">
    <div class="modal">
      <button class="close-btn" onclick="closeModal()">✕</button>
      <h3>Confirm Booking</h3>
      <div id="slotInfo" class="modal-sub"></div>

      <input id="clientName" placeholder="Your name">
      <input id="clientEmail" placeholder="Your email">
      <textarea id="notes" placeholder="Notes (optional)"></textarea>

      <button class="btn primary" onclick="confirmBooking()">Book Session</button>
      <div id="msg" class="muted"></div>
    </div>
  </div>

<script>
const sb = window.APP.getSB();
let selectedSlot = null;
const normEmail = (s) => (s || "").trim().toLowerCase();

function fmt(iso){
  return new Date(iso).toLocaleString([], {
    weekday:"short", day:"2-digit", month:"short",
    hour:"2-digit", minute:"2-digit"
  });
}

function openModal(slot){
  selectedSlot = slot;
  slotInfo.innerHTML = `<strong>${slot.coachName}</strong><br>${fmt(slot.slot_start)}`;
  msg.textContent = "";
  overlay.style.display = "flex";
}

function closeModal(){
  overlay.style.display = "none";
}

async function confirmBooking(){
  if(!clientName.value || !clientEmail.value || !selectedSlot){
    msg.textContent = "Please fill all required fields.";
    return;
  }

  const { error } = await sb.rpc("book_slot", {
    p_slot_id: selectedSlot.id,
    p_client_name: clientName.value,
    p_client_email: clientEmail.value,
    p_notes: notes.value || null
  });

  msg.textContent = error ? error.message : "✅ Booking confirmed!";
  if(!error) setTimeout(() => { closeModal(); loadPage(); }, 800);
}

async function loadPage(){
  grid.innerHTML = "";
  status.textContent = "Loading…";

  const { data: coaches } = await sb
    .from("Coach_Partners")
    .select("email, name, specialty, bio, photo_url")
    .order("name");

  const now = new Date();
  const end = new Date(now.getTime() + 14*24*60*60*1000);

  const { data: slots } = await sb
    .from("Coach_Availability")
    .select("id, coach_email, slot_start, slot_end, location, is_booked")
    .eq("is_booked", false)
    .gte("slot_start", now.toISOString())
    .lte("slot_start", end.toISOString());

  const slotMap = {};
  (slots||[]).forEach(sl=>{
    const key = normEmail(sl.coach_email);
    if(!slotMap[key]) slotMap[key]=[];
    slotMap[key].push(sl);
  });

  status.textContent = `Showing ${coaches.length} coaches`;

  coaches.forEach(c=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.className="photo";
    window.APP.setSafeImage(img,c.photo_url);

    const nm=document.createElement("h3");
    nm.className="name";
    nm.textContent=c.name;

    const tag=document.createElement("div");
    tag.className="tag";
    tag.textContent=c.specialty||"Coach";

    const bio=document.createElement("div");
    bio.className="bio";
    bio.textContent=c.bio||"Profile coming soon.";

    const btn=document.createElement("button");
    btn.className="btn secondary";
    btn.textContent="View Slots";

    const slotsWrap=document.createElement("div");
    slotsWrap.className="slots hidden";

    btn.onclick=()=>{
      const hidden=slotsWrap.classList.contains("hidden");
      slotsWrap.classList.toggle("hidden");
      btn.textContent=hidden?"Hide Slots":"View Slots";
    };

    const list=slotMap[normEmail(c.email)]||[];
    if(!list.length){
      slotsWrap.innerHTML="<div class='muted'>No slots available right now.</div>";
    }else{
      list.forEach(sl=>{
        const chip=document.createElement("button");
        chip.className="slot";
        chip.textContent=fmt(sl.slot_start);
        chip.onclick=()=>openModal({...sl,coachName:c.name});
        slotsWrap.appendChild(chip);
      });
    }

    const actions=document.createElement("div");
    actions.className="actions";
    actions.appendChild(btn);

    const top=document.createElement("div");
    top.className="top";
    top.append(img,nm);

    card.append(top,tag,bio,actions,slotsWrap);
    grid.appendChild(card);
  });
}

window.addEventListener("load", loadPage);
</script>
</body>
</html>
