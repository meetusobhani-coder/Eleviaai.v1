<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevia AI — Coaches</title>


  <link rel="stylesheet" href="style.css">

  <!-- External scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app2.js"></script>

  <style>
    .wrap{max-width:1100px;margin:0 auto;padding:24px 16px;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px;}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:620px){.grid{grid-template-columns:1fr;}}

    .card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,0.08);transition:.2s;}
    .card:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(0,0,0,.12);}
    .top{display:flex;gap:12px;}

    .photo{width:72px;height:72px;border-radius:50%;object-fit:cover;}
    .name{font-weight:900;font-size:1.1rem;margin:0;color:#111827;}
    .tag{display:inline-block;background:#eef2ff;color:#3730a3;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:700;}
    .bio{
      margin-top:6px;
      color:#4b5563;
      font-size:.9rem;
      line-height:1.4;
    }
  </style>
</head>

<body>
<header><h1>Elevia AI</h1></header>

<main>
  <div class="wrap">
    <h2>Approved Coaches</h2>
    <p>Browse our verified coaches and find the right support.</p>

    <div id="status">Loading…</div>
    <div id="grid" class="grid"></div>
  </div>
</main>

<script>
async function loadCoaches(){
  const sb = window.APP.getSB();
  const status = document.getElementById("status");
  const grid = document.getElementById("grid");

  const { data, error } = await sb
    .from("Coach_Partners")
    .select("name, specialty, bio, photo_url")
    .order("name");

  if (error) {
    status.textContent = error.message;
    return;
  }

  if (!data.length) {
    status.textContent = "No coaches available.";
    return;
  }

  status.textContent = `Showing ${data.length} coaches`;
  grid.innerHTML = "";

  data.forEach(c => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.className = "photo";
    img.src = c.photo_url || window.APP.noPhoto();

    const info = document.createElement("div");

const name = document.createElement("h3");
name.className = "name";

const derivedName =
  c.name && c.name.trim() !== ""
    ? c.name
    : (c.email ? c.email.split("@")[0].replace(/[._]/g, " ") : "");

name.textContent = derivedName;

name.textContent = derivedName;

    const tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = c.specialty || "Coach";

    const bio = document.createElement("div");
    bio.className = "bio";
    let shortBio = "Profile coming soon.";

if (c.bio) {
  const sentences = c.bio.split(".");
  shortBio = sentences.slice(0, 2).join(".").trim();
  if (!shortBio.endsWith(".")) shortBio += ".";
}

bio.textContent = shortBio;

    info.appendChild(name);
    info.appendChild(tag);
    info.appendChild(bio);

    const top = document.createElement("div");
    top.className = "top";
    top.appendChild(img);
    top.appendChild(info);

    card.appendChild(top);
    grid.appendChild(card);
  });
}

window.addEventListener("load", loadCoaches);
</script>
</body>
</html>
